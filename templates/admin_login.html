<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Login</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0b0c14; --surface: #13141f; --border: rgba(255,255,255,0.08);
      --accent: #4f8ef7; --text: #e8ecf4; --muted: #7e8a9e; --error: #f87171;
    }
    body {
      background: var(--bg); color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      min-height: 100vh; display: flex; align-items: center; justify-content: center;
      -webkit-font-smoothing: antialiased;
    }
    .card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 20px; padding: 40px 32px; width: 100%; max-width: 360px;
      text-align: center;
    }
    .icon { font-size: 36px; margin-bottom: 16px; }
    h1 { font-size: 22px; font-weight: 700; margin-bottom: 6px; }
    p { font-size: 14px; color: var(--muted); margin-bottom: 28px; }
    input {
      width: 100%; padding: 12px 16px; border-radius: 10px;
      border: 1px solid var(--border); background: #1a1c2c;
      color: var(--text); font-size: 15px; margin-bottom: 14px; outline: none;
    }
    input:focus { border-color: var(--accent); }
    button {
      width: 100%; padding: 13px; border-radius: 100px; border: none;
      background: linear-gradient(135deg, #4f8ef7, #38d9a9);
      color: #fff; font-size: 15px; font-weight: 700; cursor: pointer;
    }
    .error { color: var(--error); font-size: 13px; margin-bottom: 14px; }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon">🔐</div>
    <h1>Admin Login</h1>
    <p>Enter the admin password to manage settings</p>
    {% if error %}<p class="error">{{ error }}</p>{% endif %}
    <form method="POST" action="/admin/login">
      <input type="password" name="password" placeholder="Password" autofocus required>
      <button type="submit">Sign In</button>
    </form>
  </div>
</body>
</html>
